name: Weekly Paper Briefing

on:
  schedule:
    # 매주 월요일 08:00 KST = 일요일 23:00 UTC
    - cron: "0 23 * * 0"
  workflow_dispatch:        # 수동 실행 허용
    inputs:
      dry_run:
        description: "LLM 호출 없이 파이프라인만 점검"
        type: boolean
        default: false

permissions:
  contents: write           # docs/ data/ 커밋 푸시용

concurrency:
  group: weekly-briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build briefing
        env:
          # 기본 provider: Gemini API (config.yaml에서 openai_compat → Gemini 호환 엔드포인트)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 선택: provider 전환 시 활성
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 선택: 인용수 조회 rate limit 완화용 (없어도 동작)
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m src.main --dry-run
          else
            python -m src.main
          fi

      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "chore: weekly briefing $(date -u +%Y-%m-%d)"
            git push
          fi
